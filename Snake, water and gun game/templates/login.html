<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SWG: Element Arena</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">
    <canvas id="scene-canvas" aria-hidden="true"></canvas>
    <div class="auth-backdrop">
        <div class="auth-glow auth-glow-1"></div>
        <div class="auth-glow auth-glow-2"></div>
        <div class="auth-glow auth-glow-3"></div>
    </div>

    <div class="auth-card glass-panel">
        <div class="auth-header">
            <span class="auth-badge">PLAYER LOGIN</span>
            <h1>Enter the arena</h1>
            <p>Sign in to unlock levels from 1 to 20.</p>
        </div>

        {% if error %}
        <div class="auth-error">{{ error }}</div>
        {% endif %}

        <form method="post" class="auth-form">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autocomplete="username">

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">

            <button type="submit" class="auth-btn">LOGIN</button>
        </form>

        <div class="auth-footnote">
            New player? <a href="{{ url_for('register') }}">Create an account</a>
        </div>
    </div>
</body>
</html>
